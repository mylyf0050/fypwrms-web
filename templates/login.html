<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — FYPWRMS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-card__mark">FYPWRMS &middot; RECORD ACCESS</div>
      <h1>Final Year Project<br>Records Register</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash flash--{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" value="admin" autofocus required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>

      <p class="login-card__hint">Default credentials: admin / admin123</p>
    </div>
  </div>
</body>
</html>
